services:
  - type: web
    name: credlift-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install --no-cache-dir --no-build-isolation pydantic-core==2.23.4
      pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
